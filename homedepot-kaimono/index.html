<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>運動会得点板 お買い物リスト | Undokai Scoreboard Shopping Checklist</title>
  
  <!-- Google Fonts: Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    /* ── DESIGN SYSTEM TOKENS ─────────────────────────────────────────── */
    :root {
      --color-bg-base: #f6f8fc;
      --color-surface: #ffffff;
      --color-surface-dim: #f0f3fa;
      --color-border: #e2e8f0;
      
      --color-text-primary: #0f172a;
      --color-text-secondary: #475569;
      --color-text-muted: #94a3b8;
      
      --color-brand-orange: #ff9500;
      --color-brand-blue: #007aff;
      --color-brand-green: #10b981;
      --color-brand-red: #ef4444;
      
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      
      --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.05);
      --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.08);
      --shadow-lg: 0 16px 32px rgba(15, 23, 42, 0.12);
      
      --transition-fast: 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ── BASE STYLES ──────────────────────────────────────────────────── */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--color-bg-base);
      color: var(--color-text-primary);
      line-height: 1.5;
      padding-bottom: 80px;
    }

    h1, h2, h3, .font-outfit {
      font-family: 'Outfit', sans-serif;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 16px;
    }

    /* ── PREMIUM HEADER ───────────────────────────────────────────────── */
    header {
      background: linear-gradient(135deg, #ff9500 0%, #ff5e00 100%);
      color: white;
      padding: 24px 20px;
      border-radius: var(--radius-lg);
      margin-bottom: 24px;
      box-shadow: var(--shadow-md);
      position: relative;
      overflow: hidden;
    }

    header::after {
      content: 'HD';
      position: absolute;
      right: -20px;
      bottom: -20px;
      font-size: 8rem;
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      opacity: 0.08;
      pointer-events: none;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .store-badge {
      background-color: rgba(255, 255, 255, 0.2);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.05em;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    header p {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.9);
    }

    /* ── SUMMARY STATS BAR ────────────────────────────────────────────── */
    .summary-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background-color: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 16px;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-sm);
    }

    .stat-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .stat-value {
      font-family: 'Outfit', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--color-text-primary);
    }

    .stat-value.complete {
      color: var(--color-brand-green);
    }

    /* ── SECTION NAV TABS ─────────────────────────────────────────────── */
    .section-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .section-tabs::-webkit-scrollbar {
      display: none;
    }

    .tab-btn {
      background-color: var(--color-surface);
      border: 1px solid var(--color-border);
      color: var(--color-text-secondary);
      padding: 10px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: var(--transition-fast);
      box-shadow: var(--shadow-sm);
    }

    .tab-btn.active {
      background-color: var(--color-text-primary);
      color: white;
      border-color: var(--color-text-primary);
    }

    /* ── SHOPPING LIST CHECKLIST ──────────────────────────────────────── */
    .shopping-section {
      display: none;
    }

    .shopping-section.active {
      display: block;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section-heading {
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-text-secondary);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .list-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .list-item {
      background-color: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 16px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      cursor: pointer;
      transition: var(--transition-fast);
      box-shadow: var(--shadow-sm);
    }

    .list-item:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    /* Custom Checkbox styles */
    .item-checkbox {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      border: 2px solid var(--color-text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
      background-color: white;
      transition: var(--transition-fast);
    }

    .item-checkbox svg {
      width: 14px;
      height: 14px;
      fill: none;
      stroke: white;
      stroke-width: 3px;
      stroke-linecap: round;
      stroke-linejoin: round;
      transform: scale(0);
      transition: var(--transition-fast);
    }

    .list-item.checked .item-checkbox {
      border-color: var(--color-brand-green);
      background-color: var(--color-brand-green);
    }

    .list-item.checked .item-checkbox svg {
      transform: scale(1);
    }

    .item-content {
      flex-grow: 1;
    }

    .item-title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .item-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--color-text-primary);
      transition: var(--transition-fast);
    }

    .list-item.checked .item-title {
      text-decoration: line-through;
      color: var(--color-text-muted);
    }

    .item-price {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--color-text-primary);
      flex-shrink: 0;
    }

    .list-item.checked .item-price {
      color: var(--color-text-muted);
    }

    .item-subtitle {
      font-size: 0.8rem;
      color: var(--color-text-secondary);
      margin-top: 4px;
    }

    .item-badge-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .item-badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      background-color: var(--color-surface-dim);
      color: var(--color-text-secondary);
    }

    .item-badge.qty {
      background-color: rgba(0, 122, 255, 0.08);
      color: var(--color-brand-blue);
    }

    .item-badge.tag {
      background-color: rgba(255, 149, 0, 0.08);
      color: var(--color-brand-orange);
    }

    /* ── ORIGINAL REFERENCE GALLERY ───────────────────────────────────── */
    .reference-card {
      background-color: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-top: 24px;
      box-shadow: var(--shadow-sm);
    }

    .ref-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .image-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .ref-image-wrapper {
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 1px solid var(--color-border);
      background-color: var(--color-surface-dim);
      position: relative;
    }

    .ref-image {
      width: 100%;
      height: auto;
      display: block;
      transition: var(--transition-fast);
      cursor: pointer;
    }

    .ref-image:hover {
      transform: scale(1.02);
    }

    .image-caption {
      padding: 10px 14px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--color-text-secondary);
      border-top: 1px solid var(--color-border);
      background-color: var(--color-surface);
    }

    /* ── FLOATING RESET ACTION ────────────────────────────────────────── */
    .reset-bar {
      text-align: center;
      margin-top: 20px;
    }

    .reset-btn {
      background: none;
      border: none;
      color: var(--color-brand-red);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 20px;
      transition: var(--transition-fast);
    }

    .reset-btn:hover {
      background-color: rgba(239, 68, 68, 0.05);
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- HEADER -->
    <header>
      <div class="header-top">
        <span class="store-badge">PORTABLE UNDOKAI</span>
        <span class="store-badge" style="background-color: #f97316;">HOME DEPOT & AMAZON</span>
      </div>
      <h1>得点板 お買い物チェック</h1>
      <p>運動会得点板の全ハードウェア＆資材買い出しリスト。タップで進捗を記録できます。</p>
    </header>

    <!-- DYNAMIC STATS -->
    <div class="summary-stats">
      <div class="stat-card">
        <span class="stat-label">購入済み項目</span>
        <span class="stat-value" id="checked-count">0 / 11 点</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">支払い残高</span>
        <span class="stat-value complete" id="remaining-cost">$0.00</span>
      </div>
    </div>

    <!-- FILTER SECTION TABS -->
    <nav class="section-tabs" role="tablist">
      <button class="tab-btn active" onclick="switchSection(event, 'all')">全て表示</button>
      <button class="tab-btn" onclick="switchSection(event, 'homedepot')">🛠️ Home Depot</button>
      <button class="tab-btn" onclick="switchSection(event, 'amazon')">📦 Amazon / 他</button>
    </nav>

    <!-- SHOPPING LIST SECTION: ALL -->
    <div id="checklist-container">
      
      <!-- List populated dynamically by Javascript -->
      
    </div>

    <!-- RESET CHECKBOXES -->
    <div class="reset-bar">
      <button class="reset-btn" onclick="resetCheckboxes()">チェックをすべてリセット</button>
    </div>

    <!-- ORIGINAL REFERENCE IMAGES -->
    <section class="reference-card" aria-labelledby="ref-heading">
      <h2 class="ref-title" id="ref-heading"><span aria-hidden="true">📸</span> 参考価格・構造設計画像</h2>
      <div class="image-grid">
        
        <div class="ref-image-wrapper">
          <img src="parts_list.png" alt="得点板の必要パーツと価格のリスト、およびフレーム骨組み図" class="ref-image" onclick="window.open(this.src)">
          <div class="image-caption">参考画像 1: 得点板構成パーツ・カラー図面＆価格表</div>
        </div>

        <div class="ref-image-wrapper">
          <img src="home_depot_items.png" alt="Home Depot及びAmazonでの対応パーツ商品スクリーンショット" class="ref-image" onclick="window.open(this.src)">
          <div class="image-caption">参考画像 2: 各ハードウェア対応製品の仕様・商品画像</div>
        </div>

        <div class="ref-image-wrapper">
          <img src="scoreboard_field.jpg" alt="芝生のグラウンドに設置された運動会得点板の完成写真" class="ref-image" onclick="window.open(this.src)">
          <div class="image-caption">参考画像 3: グラウンド設置時の得点板完成見本</div>
        </div>

      </div>
    </section>

  </div>

  <!-- ── APPLICATION LOGIC (JAVASCRIPT) ─────────────────────────────── -->
  <script>
    // --- CHECKLIST DATABASE ---
    const shoppingItems = [
      // --- HOME DEPOT ---
      {
        id: 'hd-pipe',
        store: 'homedepot',
        title: '1.5" Schedule 40 PVC Pipe (10-foot)',
        spec: '1.5インチ塩ビパイプ (10フィート / 3.05m長さ)',
        qty: 4,
        unitPrice: 9.72,
        totalPrice: 38.88,
        tag: '🟠 🔵 🔴 🟡 塩ビパイプ'
      },
      {
        id: 'hd-elbow',
        store: 'homedepot',
        title: '1.5" PVC 90-degree Elbow',
        spec: '1.5インチ 90°エルボ継手 (上段左右用)',
        qty: 2,
        unitPrice: 0.96,
        totalPrice: 1.92,
        tag: '💗 エルボ'
      },
      {
        id: 'hd-coupling',
        store: 'homedepot',
        title: '1.5" PVC Coupling',
        spec: '1.5インチ ストレートソケット (上段中央の連結用)',
        qty: 1,
        unitPrice: 1.24,
        totalPrice: 1.24,
        tag: '💚 カップリング'
      },
      {
        id: 'hd-tee',
        store: 'homedepot',
        title: '1.5" PVC Tee',
        spec: '1.5インチ チーズ (中段左右・中段中央・下段中央用)',
        qty: 4,
        unitPrice: 3.42,
        totalPrice: 13.68,
        tag: '💜 チーズ'
      },
      {
        id: 'hd-bucket',
        store: 'homedepot',
        title: '5 Gallon Orange Homer Bucket',
        spec: '5ガロン オレンジバケツ (左右の重り・安定用)',
        qty: 2,
        unitPrice: 3.98,
        totalPrice: 7.96,
        tag: '🪣 重りバケツ'
      },
      {
        id: 'hd-lid',
        store: 'homedepot',
        title: '5 gal. Orange Bucket Lid',
        spec: '5ガロンバケツ専用フタ (中心にパイプ用穴あけ加工)',
        qty: 2,
        unitPrice: 1.98,
        totalPrice: 3.96,
        tag: '💿 バケツのフタ'
      },
      // --- AMAZON ---
      {
        id: 'az-4way',
        store: 'amazon',
        title: '1.5" 4-Way PVC Fittings (Side Outlet Tees)',
        spec: '4方向継手（土台の左右足接続用 2個入り）',
        qty: 1,
        unitPrice: 16.69,
        totalPrice: 16.69,
        tag: '💚 Olive 4方向継手'
      },
      {
        id: 'az-bungee',
        store: 'amazon',
        title: 'BEXSLE Bungee Cords (24-inch, 4 Pack)',
        spec: '24インチ バンジーコード 4本入り (バケツ固定用)',
        qty: 1,
        unitPrice: 9.98,
        totalPrice: 9.98,
        tag: '🔗 バンジーコード'
      },
      {
        id: 'az-rings',
        store: 'amazon',
        title: 'MorningRo 4-Inch Loose Leaf Binder Rings',
        spec: '4インチ 特大バインダーリング 20個入り (得点カード吊り用)',
        qty: 1,
        unitPrice: 19.99,
        totalPrice: 19.99,
        tag: '⭕ 得点吊りリング'
      },
      {
        id: 'az-laminator',
        store: 'amazon',
        title: 'Scotch Thermal Laminator (Extra Wide 13")',
        spec: 'Scotch ラミネーター機 (11x17サイズ対応)',
        qty: 1,
        unitPrice: 47.58,
        totalPrice: 47.58,
        tag: '🖨️ ラミネーター機'
      },
      {
        id: 'az-pouches',
        store: 'amazon',
        title: 'Laminating Pouches (11x17, 5 Mil, 100 Pack)',
        spec: '11x17インチ 厚さ5Mil ラミネートフィルム 100枚入り',
        qty: 1,
        unitPrice: 28.99,
        totalPrice: 28.99,
        tag: '📄 5Milフィルム'
      }
    ];

    let currentSectionFilter = 'all';

    // --- RENDER SHOPPING LIST ---
    function renderShoppingList() {
      const container = document.getElementById('checklist-container');
      container.innerHTML = '';

      const filteredItems = shoppingItems.filter(item => {
        if (currentSectionFilter === 'all') return true;
        return item.store === currentSectionFilter;
      });

      filteredItems.forEach(item => {
        const isChecked = getCheckedState(item.id);

        const itemEl = document.createElement('div');
        itemEl.className = `list-item ${isChecked ? 'checked' : ''}`;
        itemEl.onclick = () => toggleCheck(item.id);

        itemEl.innerHTML = `
          <div class="item-checkbox">
            <svg viewBox="0 0 24 24">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
          <div class="item-content">
            <div class="item-title-row">
              <span class="item-title">${item.title}</span>
              <span class="item-price">$${item.totalPrice.toFixed(2)}</span>
            </div>
            <div class="item-subtitle">${item.spec}</div>
            <div class="item-badge-row">
              <span class="item-badge qty">個数: ${item.qty}</span>
              <span class="item-badge">単価: $${item.unitPrice.toFixed(2)}</span>
              <span class="item-badge tag">${item.tag}</span>
            </div>
          </div>
        `;

        container.appendChild(itemEl);
      });

      calculateTotals();
    }

    // --- STATE PERSISTENCE ---
    function getCheckedState(itemId) {
      return localStorage.getItem(`shopping-checked-${itemId}`) === 'true';
    }

    function setCheckedState(itemId, state) {
      localStorage.setItem(`shopping-checked-${itemId}`, state);
    }

    function toggleCheck(itemId) {
      const currentState = getCheckedState(itemId);
      setCheckedState(itemId, !currentState);
      renderShoppingList();
    }

    function resetCheckboxes() {
      if (confirm('すべてのチェックマークをリセットしますか？')) {
        shoppingItems.forEach(item => {
          setCheckedState(item.id, false);
        });
        renderShoppingList();
      }
    }

    // --- CALCULATE TOTALS ---
    function calculateTotals() {
      let checkedCount = 0;
      let spentCost = 0;
      let totalCost = 0;

      shoppingItems.forEach(item => {
        totalCost += item.totalPrice;
        if (getCheckedState(item.id)) {
          checkedCount++;
          spentCost += item.totalPrice;
        }
      });

      const remainingCost = totalCost - spentCost;

      // Update UI
      document.getElementById('checked-count').innerText = `${checkedCount} / ${shoppingItems.length} 点`;
      
      const remainingCostEl = document.getElementById('remaining-cost');
      remainingCostEl.innerText = `$${remainingCost.toFixed(2)}`;

      if (remainingCost === 0) {
        remainingCostEl.className = 'stat-value complete';
        remainingCostEl.innerText = '買い出し完了！🎉';
      } else {
        remainingCostEl.className = 'stat-value';
      }
    }

    // --- FILTER SWITCHER ---
    function switchSection(evt, storeKey) {
      currentSectionFilter = storeKey;

      const tabs = document.querySelectorAll('.tab-btn');
      tabs.forEach(tab => tab.classList.remove('active'));

      evt.currentTarget.classList.add('active');

      renderShoppingList();
    }

    // --- INIT ---
    window.onload = function() {
      renderShoppingList();
    };
  </script>
</body>
</html>
